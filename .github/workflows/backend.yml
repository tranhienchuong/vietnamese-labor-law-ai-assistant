name: Backend

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"

    env:
      APP_ENV: test
      AUTH_SECRET: test-secret-for-ci
      AUTH_SEED_DEFAULT_USERS: "0"
      APP_DB_PATH: artifacts/test-app.db
      GROQ_API_KEY: dummy
      AZURE_OPENAI_API_KEY: dummy
      QDRANT_API_KEY: dummy
      CORS_ALLOW_ORIGINS: "*"
      QUERY_ROUTER_ENABLED: "0"
      RERANKER_MODEL: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src/vn_labor_law_ai_assistant/core src/vn_labor_law_ai_assistant/api src/vn_labor_law_ai_assistant/auth src/vn_labor_law_ai_assistant/db

      - name: Unit tests
        run: python -m unittest discover -s tests -v
